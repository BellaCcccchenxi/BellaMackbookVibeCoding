name: 构建诗词浮窗安装包

# 手动触发，或推送 v 开头的 tag（如 v1.0.0）时自动构建
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 构建 ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (.dmg)
            script: dist:mac
          - os: windows-latest
            label: Windows (.exe)
            script: dist:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: poetry-widget
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 构建安装包
        run: npm run ${{ matrix.script }}

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 诗词浮窗-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            poetry-widget/release/*.dmg
            poetry-widget/release/*.exe

  # 推送 tag 时，把两个平台的安装包发布到 GitHub Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有安装包
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
